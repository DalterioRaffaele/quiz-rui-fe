<div class="errors-container">
  <h2>❌ Errori</h2>
  <p class="muted">Domande sbagliate almeno una volta.</p>
  <p *ngIf="erroriList.length === 0" class="muted">🎉 Nessun errore salvato!</p>
  <div class="list">
    <div *ngFor="let item of erroriList" class="item card">
      <div class="badges">
        <span class="badge">N. {{ item.numero }}</span>
        <span class="badge">{{ item.settore }}</span>
        <span class="badge">{{ item.materia }}</span>
      </div>
      <p><strong>{{ item.domanda }}</strong></p>
      <p class="danger small">❌ Sbagliate: {{ item.wrong }} — ✅ Corrette: {{ item.correct }}</p>
    </div>
  </div>
</div>
