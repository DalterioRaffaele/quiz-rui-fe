<div class="app-wrapper">

  <!-- TOOLBAR -->
  <mat-toolbar class="toolbar" *ngIf="authService.isLoggedIn">
    <button mat-icon-button (click)="toggleSidenav()" class="menu-btn">
      <span class="material-icons">{{ sidenavOpen ? 'menu_open' : 'menu' }}</span>
    </button>
    <span class="brand">
      <span class="brand-icon">🎓</span>
      <span class="brand-text">Quiz RUI <span class="brand-pro">Pro</span></span>
    </span>
    <span class="spacer"></span>
    <div class="toolbar-right">
      <div class="user-chip">
        <div class="user-avatar">{{ authService.username.charAt(0).toUpperCase() }}</div>
        <span class="user-name">{{ authService.username }}</span>
        <span class="user-role" [class.supervisor]="authService.isSupervisor">
          {{ authService.isSupervisor ? 'Supervisor' : 'Utente' }}
        </span>
      </div>
      <button mat-icon-button (click)="authService.logout()" matTooltip="Esci" class="logout-btn">
        <span class="material-icons">logout</span>
      </button>
    </div>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">

    <!-- SIDEBAR -->
    <mat-sidenav
      [opened]="sidenavOpen && authService.isLoggedIn"
      [mode]="isMobile ? 'over' : 'side'"
      class="sidenav"
      (backdropClick)="sidenavOpen = false">

      <div class="sidenav-header">
        <div class="sidenav-logo">🎓</div>
        <div>
          <div class="sidenav-title">Quiz RUI Pro</div>
          <div class="sidenav-subtitle">Piattaforma di Studio</div>
        </div>
      </div>

      <div class="sidenav-section-label">MENU</div>

      <div class="nav-links">
        <a class="nav-item" routerLink="/quiz" routerLinkActive="nav-active"
          (click)="isMobile && (sidenavOpen = false)">
          <span class="material-icons">quiz</span>
          <span>Quiz</span>
        </a>
        <a class="nav-item" routerLink="/errors" routerLinkActive="nav-active"
          (click)="isMobile && (sidenavOpen = false)">
          <span class="material-icons">error_outline</span>
          <span>Errori</span>
        </a>
        <a class="nav-item" routerLink="/progressi" routerLinkActive="nav-active"
          (click)="isMobile && (sidenavOpen = false)">
          <span class="material-icons">bar_chart</span>
          <span>Progressi</span>
        </a>
        <a class="nav-item" routerLink="/utenti" routerLinkActive="nav-active"
          *ngIf="authService.isSupervisor"
          (click)="isMobile && (sidenavOpen = false)">
          <span class="material-icons">manage_accounts</span>
          <span>Utenti</span>
        </a>
      </div>

      <div class="sidenav-footer">
        <mat-divider></mat-divider>
        <div class="logout-item" (click)="authService.logout()">
          <span class="material-icons">logout</span>
          <span>Esci</span>
        </div>
      </div>

    </mat-sidenav>

    <!-- CONTENT -->
    <mat-sidenav-content class="main-content">
      <router-outlet></router-outlet>
    </mat-sidenav-content>

  </mat-sidenav-container>

</div>

<div class="mobile-overlay"
  *ngIf="isMobile && sidenavOpen && authService.isLoggedIn"
  (click)="sidenavOpen = false">
</div>
