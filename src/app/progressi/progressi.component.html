<div class="progressi-container">
  <h2>📈 Progressi</h2>
  <div class="stats-grid">
    <div class="stat card">
      <div class="label">Domande viste</div>
      <div class="value">{{ statsViste }}</div>
    </div>
    <div class="stat card">
      <div class="label">Con errori</div>
      <div class="value danger">{{ erroriCount }}</div>
    </div>
    <div class="stat card">
      <div class="label">Corrette totali</div>
      <div class="value success">{{ statsCorrette }}</div>
    </div>
    <div class="stat card">
      <div class="label">Sbagliate totali</div>
      <div class="value danger">{{ statsErrori }}</div>
    </div>
    <div class="stat card">
      <div class="label">Precisione</div>
      <div class="value">{{ statsAccuracy }}%</div>
    </div>
  </div>
  <div style="margin-top: 24px;" *ngIf="authService.isSupervisor">
    <button class="action-btn danger" (click)="resetProgressi()">🗑 Reset progressi</button>
  </div>
</div>
