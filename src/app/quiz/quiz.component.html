<div class="quiz-container">

  <!-- LOGIN -->
  <div *ngIf="!authService.isLoggedIn" class="login-section">
    <div class="card login-card">
  <h1>Quiz RUI Pro</h1>
  <p class="muted">Accedi per iniziare l'allenamento</p>
  <input [(ngModel)]="loginUsername" class="input-field full-width"
         placeholder="Username" />
  <input [(ngModel)]="loginPassword" class="input-field full-width"
         type="password" placeholder="Password"
         (keyup.enter)="doLogin()" />
  <p *ngIf="loginError" style="color:#f44336; font-size:13px; text-align:center;">
    {{ loginError }}
  </p>
  <button class="action-btn full-width" (click)="doLogin()"
          [disabled]="!loginUsername.trim() || !loginPassword.trim() || loginLoading">
    {{ loginLoading ? 'Accesso in corso...' : 'ACCEDI' }}
  </button>
</div>

  </div>

  <!-- QUIZ -->
  <div *ngIf="authService.isLoggedIn">
    <h2>Allenamento</h2>
    <div class="controls">
      <select [(ngModel)]="selectedSettore" class="select-field" (change)="caricaMaterie()">
        <option value="">Settore</option>
        <option *ngFor="let s of settori()" [value]="s">{{ s }}</option>
      </select>
      <select [(ngModel)]="selectedMateria" class="select-field" [disabled]="!materie().length">
        <option value="">Materia</option>
        <option *ngFor="let m of materie()" [value]="m">{{ m }}</option>
      </select>
      <input type="number" [(ngModel)]="numDomande" min="1" max="100" class="input-field small" />
      <button class="action-btn" (click)="caricaDomande()" [disabled]="!selectedMateria">Inizia quiz</button>
    </div>

    <div class="grid" *ngIf="domande().length">
      <div *ngFor="let domanda of domande(); trackBy: trackByIndex; let i = index" class="card domanda-card">
        <div class="topline">
          <strong>{{ i + 1 }}/{{ domandeCount() }}</strong>
          <strong>{{ risposteCompletate() }}/{{ domandeCount() }}</strong>
        </div>
        <p><strong>{{ domanda.testo || domanda.domanda }}</strong></p>
        <div class="answers">
          <div *ngFor="let op of getOpzioni(domanda, i); let j = index"
               class="risposta-btn"
               [class.risposta-corretta]="risultati()[i] && getOpzioneValue(op) === risposteCorrette[i]"
               [class.risposta-sbagliata]="risultati()[i] && risposte()[i] === getOpzioneValue(op) && getOpzioneValue(op) !== risposteCorrette[i]"
               [class.selezionata]="risposte()[i] === getOpzioneValue(op)"
               (click)="!quizTerminato && selezionaRisposta(i, getOpzioneValue(op))">
            <span class="lettera">{{ ['A','B','C'][j] }}</span>
            {{ getOpzioneTesto(op) }}
            <span *ngIf="risultati()[i] && getOpzioneValue(op) === risposteCorrette[i]" class="icon">✅</span>
            <span *ngIf="risultati()[i] && risposte()[i] === getOpzioneValue(op) && getOpzioneValue(op) !== risposteCorrette[i]" class="icon">❌</span>
          </div>
        </div>
        <p *ngIf="risultati()[i] === 'wrong'" class="hint-corretta">
          ✅ Corretta: <strong>{{ risposteCorrette[i] }}</strong>
        </p>
      </div>
    </div>

    <div class="controls center" *ngIf="domande().length">
      <button class="action-btn" (click)="salvaRisposte()">Salva risposte</button>
      <button class="action-btn secondary" (click)="resetQuiz()">Reset</button>
    </div>
  </div>
</div>
